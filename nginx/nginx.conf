# =============================================================================
# Nginx Reverse Proxy Configuration
#
# Nginx serves as the single entry point for all traffic:
#   /api/*        → Node.js Fastify API (port 3001)
#   /xmpp         → Prosody WebSocket endpoint (port 5280) — WS upgrade
#   /             → React frontend (port 3000 in dev, static in prod)
#
# EC-5 (Hybrid Protocol):
#   - /xmpp handles real-time XMPP WebSocket traffic
#   - /api handles REST calls (history, uploads, admin)
#   - client_max_body_size 25m for file uploads (20MB file + multipart overhead)
# =============================================================================

# Upstream definitions — use Docker internal service names
upstream api_backend {
  server api:3001;
  keepalive 32;   # Keep connections warm to avoid TCP handshake overhead
}

upstream prosody_ws {
  # Prosody's mod_websocket + mod_bosh endpoint
  server prosody:5280;
  keepalive 64;   # Many concurrent WebSocket connections expected
}

upstream client_dev {
  # Vite React dev server (Phase 2)
  server client:3000;
  keepalive 4;
}



# ---------------------------------------------------------------------------
# HTTP server (port 80)
# For Phase 1, we run HTTP only. HTTPS can be added via Let's Encrypt in Phase 2.
# ---------------------------------------------------------------------------
server {
  listen 80;
  server_name localhost;

  # EC-5: Maximum body size for file uploads
  # 20MB files + 3MB images + multipart envelope overhead
  client_max_body_size 25m;

  # Timeout settings for long-running upload requests
  proxy_connect_timeout 60s;
  proxy_send_timeout    120s;
  proxy_read_timeout    120s;

  # ---------------------------------------------------------------------------
  # XMPP WebSocket endpoint (EC-5: real-time lane, WebSocket only)
  #
  # The React client connects here to establish the XMPP session via @xmpp/client.
  # Nginx performs the HTTP → WebSocket upgrade and proxies all WS frames to
  # Prosody's mod_websocket listener on port 5280.
  #
  # Prosody websocket path: /xmpp (configured in prosody.cfg.lua)
  # ---------------------------------------------------------------------------
  location /xmpp {
    proxy_pass http://prosody_ws/xmpp-websocket;

    # WebSocket upgrade headers (required — without these, WS handshake fails)
    proxy_http_version 1.1;
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection "upgrade";

    # Forward the real client IP (for Prosody logging + rate limiting in Phase 2)
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Host              servera.local;

    # WebSocket connections can be long-lived.
    # Set a generous timeout BUT rely on EC-7 (XEP-0199 ping) for dead detection.
    # Nginx will close the connection if no data for 1 hour (covers hibernated tabs
    # that Prosody hasn't pinged out yet).
    proxy_read_timeout  3600s;
    proxy_send_timeout  3600s;

    # Disable buffering — WebSocket frames must flow through immediately
    proxy_buffering off;
  }

  # ---------------------------------------------------------------------------
  # REST API (EC-5: heavy lifting lane — history, uploads, admin)
  # ---------------------------------------------------------------------------
  location /api/ {
    proxy_pass http://api_backend;

    proxy_http_version 1.1;
    proxy_set_header Connection      "";  # HTTP/1.1 keepalive (not upgrade)
    proxy_set_header Host            $host;
    proxy_set_header X-Real-IP       $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Allow the Node API to respond with large history payloads
    proxy_buffering on;
    proxy_buffer_size 16k;
    proxy_buffers 8 16k;
  }

  # ---------------------------------------------------------------------------
  # React / Vite Frontend (Phase 2)
  # Proxies all remaining traffic to the Vite dev server running on client:3000.
  # WebSocket upgrade headers are needed for Vite HMR to work through Nginx.
  # ---------------------------------------------------------------------------
  location / {
    proxy_pass http://client_dev;

    proxy_http_version 1.1;
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host       $host;
    proxy_set_header X-Real-IP  $remote_addr;

    # Disable caching for dev — assets are served fresh by Vite
    proxy_cache_bypass $http_upgrade;
  }

  # ---------------------------------------------------------------------------
  # Health check endpoint (used by load balancers / monitoring)
  # ---------------------------------------------------------------------------
  location /nginx-health {
    access_log off;
    return 200 "ok\n";
    add_header Content-Type text/plain;
  }
}
